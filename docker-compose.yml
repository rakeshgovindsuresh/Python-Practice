version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: payflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payflow_user
      POSTGRES_PASSWORD: payflow_pass
      POSTGRES_DB: payflow_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payflow_user -d payflow_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payflow_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: payflow_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://payflow_user:payflow_pass@postgres:5432/payflow_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
